name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1). Leave empty to use current ref.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  desktop-portable:
    name: Build Desktop Portable (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install shared dependencies
        run: npm --prefix ./web/shared ci

      - name: Install backend dependencies
        run: npm --prefix ./web/backend ci

      - name: Install frontend dependencies
        run: npm --prefix ./web/frontend ci

      - name: Build and package desktop app
        run: npm run desktop:package

      - name: Upload desktop release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-release-assets
          path: |
            release/*-win.zip
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [desktop-portable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag != '' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        working-directory: ./web/shared
        run: |
          npm install
          npm run build

      - name: Build CLI
        run: npm run build

      - name: Build frontend
        working-directory: ./web/frontend
        run: |
          npm ci
          npm run build

      - name: Build backend
        working-directory: ./web/backend
        run: |
          npm ci
          npm run build

      - name: Download desktop artifacts
        uses: actions/download-artifact@v6
        with:
          name: desktop-release-assets
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*-win.zip
            release-assets/*.exe
            release-assets/*.blockmap
          fail_on_unmatched_files: true
          append_body: true
          body: |
            ### Desktop Downloads
            - Portable (recommended): `*-win.zip`
            - Installer: `*.exe`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to npm (requires NPM_TOKEN secret to be configured in repository settings)
      - name: Publish to npm
        if: ${{ github.event_name == 'push' }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
